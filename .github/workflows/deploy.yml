name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd ~/fitness-app
          git pull origin master

      - name: Rebuild and restart containers
        run: |
          cd ~/fitness-app
          sudo docker compose up -d --build
          sudo docker image prune -f
